<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú del Día | Restaurante</title>
    <link rel="stylesheet" href="prueba.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <main class="container">
        <section class="content">
            <header>
                <h1 class="title-main">Menú <span class="accent-text">del día</span></h1>
                <p class="schedule">Disponible de 11 a.m. a 2 p.m.</p>
            </header>

            <div class="menu-items">
                <div class="category">
                    <h3>Sopa</h3>
                    <div class="pill">Lentejas rancheras</div>
                </div>

                <div class="category">
                    <h3>Proteína</h3>
                    <div class="pill">Carne o Pollo</div>
                </div>

                <div class="category">
                    <h3>Acompañante</h3>
                    <div class="pill">Arroz con fideos</div>
                </div>

                <div class="category">
                    <h3>Principio</h3>
                    <div class="pill">Frijoles o Pasta</div>
                </div>
            </div>

            <footer class="actions">
                <a href="tel:3162123456" class="btn-delivery">Solicitar Delivery</a>
                <div class="contact-info">
                    <p>Pedidos:</p>
                    <span class="phone">✆ (316) 212-3456</span>
                </div>
            </footer>
        </section>

        <section class="visual">
            <div class="image-grid">
                <div class="img-box img1">
                    <img src="assets/pastas.jpg" alt="Pastas">
                </div>
                <div class="img-box img2">
                    <img src="assets/pollos.jpg" alt="Pollos">
                </div>
                <div class="img-box img3">
                    <img src="assets/ensaladas.jpg" alt="Ensaladas">
                </div>
            </div>
        </section>
    </main>

</body>
</html>
